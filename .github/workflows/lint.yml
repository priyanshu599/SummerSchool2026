name: Count Arduino Files

on:
  push:

jobs:
  count-files:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Count Arduino Files
      run: python scripts/count_ino.py